<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Рисунок 1 – Типология веб-платформ</title>
  <link rel="stylesheet" href="vkr-figures.css">
</head>
<body>
  <figure class="vkr-figure" id="risunok-1">
    <div class="vkr-figure-inner">
      <h3 class="vkr-figure-title">Типология веб-платформ для персонального управления контентом</h3>
      
      <div class="vkr-matrix-wrap">
        <table class="vkr-matrix-table">
          <thead>
            <tr>
              <th></th>
              <th>Локальное хранение</th>
              <th>Облачное хранение</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <th>Режимный редактор</th>
              <td>
                <strong>Локальные заметки</strong><br>
                <small>Браузерные расширения, офлайн-редакторы</small>
              </td>
              <td>
                <strong>Облачные блокноты</strong><br>
                <small>Evernote, Google Keep</small>
              </td>
            </tr>
            <tr>
              <th>Бесрежимный (WYSIWYG)</th>
              <td>
                <strong>Персональные вики</strong><br>
                <small>Obsidian, локальный Notion</small>
              </td>
              <td>
                <strong>WYSIWYG-платформы</strong><br>
                <small>Coda, Notion, Roam Research</small>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="vkr-legend">
        <div class="vkr-legend-row">
          <span class="vkr-legend-label">Формат контента:</span>
          <span class="vkr-legend-tag">Markdown</span>
          <span class="vkr-legend-tag">HTML</span>
          <span class="vkr-legend-tag vkr-legend-tag-accent">MDX</span>
        </div>
        <div class="vkr-legend-row">
          <span class="vkr-legend-label">Архитектура:</span>
          <span class="vkr-legend-tag">SPA</span>
          <span class="vkr-legend-tag">PWA</span>
          <span class="vkr-legend-tag">Headless</span>
        </div>
      </div>
    </div>
    <figcaption class="vkr-figcaption">Рисунок 1 – Типология веб-платформ для персонального управления контентом по ключевым параметрам</figcaption>
  </figure>
</body>
</html>

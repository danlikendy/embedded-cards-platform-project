<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Рисунок 1 – Типология веб-платформ для персонального управления контентом</title>
  <link rel="stylesheet" href="vkr-figures.css">
</head>
<body>
  <figure class="vkr-figure" id="risunok-1">
    <div class="vkr-figure-inner vkr-figure-inner-spacious">

      <div class="vkr-matrix-wrap">
        <table class="vkr-matrix-table">
          <thead>
            <tr>
              <th><small style="font-weight:600;text-transform:uppercase;letter-spacing:0.04em">Режим редактирования / Хранение данных</small></th>
              <th>Локальное хранение</th>
              <th>Облачное хранение</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <th>Модальный редактор<br><small style="font-weight:400;text-transform:none;letter-spacing:0">(Markdown, plain text)</small></th>
              <td>
                <strong>Локальные заметки</strong>
                <small>Браузерные расширения, офлайн-редакторы</small>
              </td>
              <td>
                <strong>Облачные блокноты</strong>
                <small>Evernote, Google Keep</small>
              </td>
            </tr>
            <tr>
              <th>Немодальный (WYSIWYG)<br><small style="font-weight:400;text-transform:none;letter-spacing:0">(блоковый редактор)</small></th>
              <td>
                <strong>Персональные вики / PKM</strong>
                <small>Obsidian, Logseq, локальный Notion</small>
              </td>
              <td>
                <strong>WYSIWYG-платформы</strong>
                <small>Coda, Notion, Roam Research, Craft</small>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="vkr-legend">
        <div class="vkr-legend-row">
          <span class="vkr-legend-label">Формат контента:</span>
          <span class="vkr-legend-tag">Markdown</span>
          <span class="vkr-legend-tag">HTML</span>
          <span class="vkr-legend-tag vkr-legend-tag-accent">MDX</span>
        </div>
        <div class="vkr-legend-row">
          <span class="vkr-legend-label">Архитектура:</span>
          <span class="vkr-legend-tag">SPA</span>
          <span class="vkr-legend-tag">PWA</span>
          <span class="vkr-legend-tag">Headless CMS</span>
        </div>
      </div>
    </div>
    <figcaption class="vkr-figcaption">
      Рисунок 1 - Типология персональных веб-платформ по двум классификационным признакам: режиму редактирования и модели хранения данных
      <span class="vkr-figcaption-source">Источник: составлено автором по данным открытых описаний продуктов (Notion [16], Obsidian [17], Craft [18], Roam Research [19], Logseq [20]), 2024-2025</span>
    </figcaption>
  </figure>
</body>
</html>

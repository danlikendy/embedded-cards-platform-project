<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Рисунок 9 – TO-BE</title>
  <link rel="stylesheet" href="vkr-figures.css">
  <style>
    .arch { display:flex; flex-direction:column; gap:6px; }

    .arch-layer {
      display:flex; align-items:stretch;
      border-radius:7px; border:1.5px solid;
    }
    .arch-lbl {
      writing-mode:vertical-lr; transform:rotate(180deg);
      font-size:7px; font-weight:800; letter-spacing:1.5px;
      text-transform:uppercase; padding:10px 4px;
      min-width:20px; display:flex; align-items:center;
      justify-content:center; flex-shrink:0;
    }
    .arch-body { flex:1; padding:10px 12px 10px 8px; }

    .l-biz { background:#fefce8; border-color:#d97706; }
    .l-biz .arch-lbl { color:#b45309; background:#fde68a; }
    .l-app { background:#eff6ff; border-color:#3b82f6; }
    .l-app .arch-lbl { color:#1d4ed8; background:#bfdbfe; }
    .l-tec { background:#f0fdf4; border-color:#16a34a; }
    .l-tec .arch-lbl { color:#15803d; background:#bbf7d0; }

    .arow { display:flex; align-items:center; gap:4px; }
    .arow + .arow { margin-top:8px; }

    /* Element */
    .el { border-radius:4px; padding:6px 8px; flex-shrink:0; box-sizing:border-box; }
    .el-type { font-size:6.5px; font-style:italic; opacity:0.6; display:block; margin-bottom:1px; }
    .el-name { font-size:9.5px; font-weight:700; color:#1e293b; display:block; line-height:1.25; }
    .el-sub  { font-size:7.5px; color:#64748b; display:block; margin-top:2px; line-height:1.3; }
    .el-good { font-size:7.5px; color:#16a34a; font-weight:600; display:block; margin-top:2px; }
    .el-note { font-size:7.5px; color:#7c3aed; font-weight:500; display:block; margin-top:2px; }

    .e-biz  { background:#fef9c3; border:1.5px solid #d97706; }
    .e-app  { background:#dbeafe; border:1.5px solid #3b82f6; }
    .e-tec  { background:#dcfce7; border:1.5px solid #16a34a; }
    .e-auto { background:#f0fdf4; border:1.5px solid #22c55e; }
    .e-fall { background:#fdf4ff; border:1.5px dashed #c084fc; }
    .e-fall .el-name { color:#7c3aed; }

    /* Step badge */
    .sn {
      display:inline-flex; align-items:center; justify-content:center;
      width:15px; height:15px; border-radius:50%;
      font-size:8px; font-weight:800; color:#fff; flex-shrink:0; margin-bottom:2px;
    }
    .sn-ok   { background:#475569; }
    .sn-auto { background:#16a34a; }
    .pw { display:flex; flex-direction:column; align-items:center; gap:1px; }

    /* Arrows */
    .arr   { color:#94a3b8; font-size:16px; flex-shrink:0; line-height:1; user-select:none; }
    .arr-g { color:#22c55e; font-size:16px; flex-shrink:0; line-height:1; }

    /* Auto badge (inline) */
    .auto-badge {
      display:flex; flex-direction:column; align-items:center; gap:1px;
      padding:4px 6px; background:#f0fdf4; border:1px solid #22c55e;
      border-radius:4px; flex-shrink:0;
    }
    .auto-badge-icon { font-size:12px; line-height:1; }
    .auto-badge-lbl  { font-size:6.5px; color:#15803d; font-weight:700; white-space:nowrap; }

    /* Priority chain */
    .pchain { display:flex; align-items:center; gap:2px; flex-wrap:nowrap; margin-top:4px; }
    .pc { padding:1px 5px; border-radius:3px; font-weight:700; font-size:7px; white-space:nowrap; }
    .pc1 { background:#fde68a; color:#92400e; }
    .pc2 { background:#dbeafe; color:#1e40af; }
    .pc3 { background:#e0e7ff; color:#3730a3; }
    .pc4 { background:#ede9fe; color:#6d28d9; }
    .pc5 { background:#f3f4f6; color:#374151; }
    .pc6 { background:#fef2f2; color:#991b1b; }
    .pc-sep { color:#cbd5e1; font-size:9px; }

    /* DTO mini table */
    .dto { display:grid; grid-template-columns:auto 1fr; gap:1px 6px; font-size:7.5px; background:#fff; border:1px solid #bfdbfe; border-radius:3px; padding:4px 6px; margin-top:4px; }
    .dto-k { color:#1e40af; font-weight:700; }
    .dto-v { color:#475569; }

    /* Return flow */
    .ret {
      margin-top:6px; padding:4px 10px;
      background:#fff; border:1px solid #c7d2fe;
      border-radius:4px; font-size:7.5px; color:#4338ca;
      display:flex; align-items:center; gap:6px;
    }
    .ret-line { flex:1; height:1px; background:repeating-linear-gradient(90deg,#818cf8 0 4px,transparent 4px 7px); }

    /* Graceful */
    .grace {
      margin-top:6px; padding:6px 10px;
      background:#fdf4ff; border:1.5px dashed #c084fc;
      border-radius:5px; display:flex; align-items:baseline; gap:8px;
    }
    .grace-hdr { font-size:8px; font-weight:800; color:#7c3aed; white-space:nowrap; }
    .grace-body { font-size:7.5px; color:#6d28d9; line-height:1.4; }

    /* Output */
    .out-row { margin-top:8px; }
    .out-label { font-size:7.5px; color:#16a34a; font-style:italic; display:block; margin-bottom:3px; }

    /* Metrics */
    .mstrip { display:flex; border-radius:5px; overflow:hidden; border:1px solid #e2e8f0; margin-top:4px; }
    .mc { flex:1; padding:6px 8px; background:#fff; border-right:1px solid #e2e8f0; text-align:center; }
    .mc:last-child { border-right:none; }
    .mc-val { font-size:15px; font-weight:800; display:block; line-height:1.1; }
    .mc-val--good { color:#16a34a; }
    .mc-lbl { font-size:7px; color:#64748b; display:block; margin-top:1px; }

    /* Legend */
    .leg { display:flex; gap:12px; font-size:7.5px; color:#64748b; padding:5px 10px; background:#f8fafc; border:1px solid #e2e8f0; border-radius:5px; flex-wrap:wrap; align-items:center; margin-top:4px; }
    .li { display:flex; align-items:center; gap:4px; }
    .ll   { width:20px; height:1.5px; background:#94a3b8; }
    .ll-g { width:20px; height:1.5px; background:#22c55e; }
    .ll-d { width:20px; height:1px; background:repeating-linear-gradient(90deg,#818cf8 0 4px,transparent 4px 7px); }
    .lb-a { width:13px; height:9px; border:1.5px dashed #22c55e; border-radius:2px; background:rgba(34,197,94,.05); }
    .lb-f { width:13px; height:9px; border:1.5px dashed #c084fc; border-radius:2px; background:#fdf4ff; }
  </style>
</head>
<body>
  <figure class="vkr-figure vkr-figure-wide">
    <div class="vkr-figure-inner vkr-figure-inner-spacious">
      <div class="arch">

        <!-- ═══ BUSINESS LAYER ═══ -->
        <div class="arch-layer l-biz">
          <div class="arch-lbl">Бизнес-слой</div>
          <div class="arch-body">

            <!-- Row 1: Full flow -->
            <div class="arow">
              <div class="pw">
                <div class="el e-biz" style="min-width:85px">
                  <span class="el-type">«actor»</span>
                  <span class="el-name">Автор заметок</span>
                  <span class="el-sub">инициирует вставку источника в MDX</span>
                </div>
              </div>
              <span class="arr">→</span>
              <div class="pw">
                <span class="sn sn-ok">1</span>
                <div class="el e-biz" style="min-width:105px">
                  <span class="el-type">«process»</span>
                  <span class="el-name">Вставка URL в редактор</span>
                  <span class="el-sub">вводит ссылку; debounce-триггер запускает агрегацию</span>
                  <span class="el-good">1 действие пользователя</span>
                </div>
              </div>
              <span class="arr-g">→</span>
              <div class="auto-badge">
                <span class="auto-badge-icon">⚡</span>
                <span class="auto-badge-lbl">платформа</span>
                <span class="auto-badge-lbl">автоматически</span>
              </div>
              <span class="arr-g">→</span>
              <div class="pw">
                <span class="sn sn-ok">2</span>
                <div class="el e-biz" style="min-width:110px">
                  <span class="el-type">«process»</span>
                  <span class="el-name">Проверка карточки</span>
                  <span class="el-sub">просматривает автозаполненный превью; при необходимости корректирует</span>
                </div>
              </div>
              <span class="arr">→</span>
              <div class="pw">
                <span class="sn sn-ok">3</span>
                <div class="el e-biz" style="min-width:105px">
                  <span class="el-type">«process»</span>
                  <span class="el-name">Сохранение MDX</span>
                  <span class="el-sub">фиксирует документ</span>
                  <span class="el-good">портативный формат; версионируется в git</span>
                </div>
              </div>
            </div>

            <!-- Output -->
            <div class="out-row">
              <span class="out-label">↓ результат: MDX-документ с полноценной карточкой</span>
              <div class="el e-biz" style="border-color:#16a34a; background:#f0fdf4; display:inline-flex; flex-direction:column">
                <span class="el-type">«business object»</span>
                <span class="el-name">MDX с JSX-карточкой — &lt;LinkCard url title description image /&gt;</span>
                <span class="el-sub">нормализованные метаданные · структурированный формат · обновляемый · версионируется</span>
              </div>
            </div>

          </div>
        </div>

        <!-- ═══ APPLICATION LAYER ═══ -->
        <div class="arch-layer l-app">
          <div class="arch-lbl">Приложения</div>
          <div class="arch-body">

            <!-- Pipeline row 1: MDX Editor → API → Parser → Cache → DTO -->
            <div class="arow">
              <div class="el e-app" style="min-width:118px">
                <span class="el-type">«component»</span>
                <span class="el-name">MDX-редактор</span>
                <span class="el-sub">с автодополнением JSX-компонентов</span>
                <span class="el-good">debounce-триггер: 300 мс</span>
                <span class="el-good">реалтайм-рендер карточки превью</span>
              </div>
              <span class="arr-g">→</span>
              <div class="el e-app" style="min-width:115px">
                <span class="el-type">«component»</span>
                <span class="el-name">API агрегации</span>
                <span class="el-sub">server-side / serverless</span>
                <span class="el-good">CORS-независимый fetch</span>
                <span class="el-good">принимает URL → DTO</span>
              </div>
              <span class="arr-g">→</span>
              <div class="el e-app" style="flex:1">
                <span class="el-type">«application service»</span>
                <span class="el-name">Парсинг и нормализация метаданных</span>
                <span class="el-sub">приоритет полей:</span>
                <div class="pchain">
                  <span class="pc pc1">OG</span><span class="pc-sep">›</span>
                  <span class="pc pc2">JSON-LD</span><span class="pc-sep">›</span>
                  <span class="pc pc3">Twitter</span><span class="pc-sep">›</span>
                  <span class="pc pc4">Microdata</span><span class="pc-sep">›</span>
                  <span class="pc pc5">meta</span><span class="pc-sep">›</span>
                  <span class="pc pc6">title+p</span>
                </div>
              </div>
              <span class="arr-g">→</span>
              <div class="el e-app" style="min-width:105px">
                <span class="el-type">«application service»</span>
                <span class="el-name">Кэш метаданных</span>
                <span class="el-sub">ключ: hash(URL)</span>
                <span class="el-sub">TTL: 24 ч</span>
                <span class="el-good">cache hit &lt;5 мс</span>
              </div>
              <span class="arr-g">→</span>
              <div class="el e-app" style="min-width:105px">
                <span class="el-type">«data object»</span>
                <span class="el-name">DTO метаданных</span>
                <div class="dto">
                  <span class="dto-k">title</span>    <span class="dto-v">string</span>
                  <span class="dto-k">description</span><span class="dto-v">string</span>
                  <span class="dto-k">image</span>    <span class="dto-v">URL|null</span>
                  <span class="dto-k">canonical</span><span class="dto-v">URL</span>
                  <span class="dto-k">source</span>   <span class="dto-v">OG|JSON-LD|…</span>
                </div>
              </div>
            </div>

            <!-- Return flow -->
            <div class="ret">
              <span style="font-weight:700;white-space:nowrap">DTO → MDX-редактор</span>
              <div class="ret-line"></div>
              <span>JSON-ответ возвращается: карточка заполняется автоматически (title, description, image) → JSX-компонент готов без ручного ввода</span>
            </div>

            <!-- Graceful degradation -->
            <div class="grace">
              <span class="grace-hdr">Graceful degradation</span>
              <span class="grace-body">
                При таймауте (&gt;5 с) или сбое сети: вставляется URL + доменное имя (извлекаются локально).
                Файл не ломается; пользователь видит уведомление и может обновить карточку позже.
              </span>
            </div>

          </div>
        </div>

        <!-- ═══ TECHNOLOGY LAYER ═══ -->
        <div class="arch-layer l-tec">
          <div class="arch-lbl">Технологии</div>
          <div class="arch-body">
            <div class="arow">
              <div class="el e-tec" style="flex:1">
                <span class="el-type">«technology service»</span>
                <span class="el-name">HTTP GET агент (server-side)</span>
                <span class="el-sub">fetch от имени сервера · обходит CORS · следует редиректам (301/302) · User-Agent · таймаут 5 с · 2 ретрая</span>
                <span class="el-good">CORS-независимость: ключевое отличие от AS-IS</span>
              </div>
              <span class="arr">→</span>
              <div class="el e-tec" style="flex:1">
                <span class="el-type">«technology node»</span>
                <span class="el-name">Внешний сайт-источник</span>
                <span class="el-sub">возвращает HTML-страницу · OG-теги: og:title, og:description, og:image · JSON-LD: @type Article/WebPage · Fallback: &lt;title&gt; + первый &lt;p&gt;</span>
              </div>
              <span class="arr" style="color:#94a3b8">←</span>
              <div style="font-size:7.5px;color:#64748b;padding:0 6px;flex-shrink:0">
                <strong style="display:block">HTTP-ответ (HTML)</strong>
                Content-Type: text/html<br>
                метаданные в &lt;head&gt;<br>
                <span style="color:#16a34a;font-weight:600">→ передаётся парсеру</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Metrics -->
        <div class="mstrip">
          <div class="mc"><span class="mc-val mc-val--good">3</span><span class="mc-lbl">шага пользователя (vs 5 в AS-IS)</span></div>
          <div class="mc"><span class="mc-val mc-val--good">~30 с</span><span class="mc-lbl">время вставки (снижение ×6–10)</span></div>
          <div class="mc"><span class="mc-val mc-val--good">Низкий</span><span class="mc-lbl">риск ошибок (автозаполнение)</span></div>
          <div class="mc"><span class="mc-val mc-val--good">100%</span><span class="mc-lbl">автоматизация агрегации</span></div>
          <div class="mc"><span class="mc-val mc-val--good">Есть</span><span class="mc-lbl">JSX-карточка с title, desc, img</span></div>
        </div>

        <!-- Legend -->
        <div class="leg">
          <div class="li"><div class="ll"></div><span>поток обслуживания</span></div>
          <div class="li"><div class="ll-g"></div><span>автоматизированный поток</span></div>
          <div class="li"><div class="ll-d"></div><span>поток данных DTO → редактор</span></div>
          <div class="li"><div class="lb-a"></div><span>зона автоматизации</span></div>
          <div class="li"><div class="lb-f"></div><span>graceful degradation</span></div>
        </div>

      </div>
    </div>
    <figcaption class="vkr-figcaption">
      Рисунок 9 – Архитектурная модель TO-BE: встраивание внешней ссылки через платформенный контур MVP с серверной агрегацией метаданных
      <span class="vkr-figcaption-source">Источник: составлено автором; целевая архитектура MVP сформирована на основе требований T-01–T-03 (табл. 9, п. 2.3) и SIPOC (табл. 8); нотация адаптирована из ArchiMate 3.1 (The Open Group, 2019)</span>
    </figcaption>
  </figure>
</body>
</html>

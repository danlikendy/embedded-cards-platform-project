<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Рисунок 11 – C4-диаграмма контейнеров платформы MDX Cards</title>
  <link rel="stylesheet" href="vkr-figures.css">
  <style>
    .c4 { display:flex; flex-direction:column; gap:10px; }

    /* System boundary */
    .c4-system {
      border: 2px dashed #374151;
      border-radius: 10px;
      padding: 14px 16px 12px;
      background: #f9fafb;
      position: relative;
    }
    .c4-system-label {
      position: absolute; top:-10px; left:16px;
      background:#f9fafb; padding:0 6px;
      font-size:8px; font-weight:700; letter-spacing:1px;
      text-transform:uppercase; color:#6b7280;
    }
    .c4-system-inner {
      display:grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap:8px;
      margin-top:6px;
    }

    /* Container boxes */
    .c4-box {
      border-radius:8px; border:1.5px solid;
      padding:10px; display:flex; flex-direction:column; gap:4px;
    }
    .c4-box-browser { background:#eff6ff; border-color:#3b82f6; }
    .c4-box-server  { background:#fefce8; border-color:#d97706; }
    .c4-box-cache   { background:#f0fdf4; border-color:#16a34a; }
    .c4-box-storage { background:#fdf4ff; border-color:#a855f7; }

    .c4-box-type {
      font-size:7px; font-weight:700; letter-spacing:1px; text-transform:uppercase;
    }
    .c4-box-browser .c4-box-type { color:#1d4ed8; }
    .c4-box-server  .c4-box-type { color:#b45309; }
    .c4-box-cache   .c4-box-type { color:#15803d; }
    .c4-box-storage .c4-box-type { color:#7e22ce; }

    .c4-box-name {
      font-size:11px; font-weight:700; color:#111827; line-height:1.3;
    }
    .c4-box-tech {
      font-size:8.5px; color:#6b7280; margin-top:1px;
    }
    .c4-box-desc {
      font-size:8.5px; color:#374151; line-height:1.4; margin-top:3px;
      border-top:1px solid #e5e7eb; padding-top:4px;
    }

    /* External actors row */
    .c4-actors {
      display:grid; grid-template-columns:1fr 1fr; gap:8px;
    }
    .c4-actor {
      border-radius:8px; border:1.5px solid #d1d5db;
      padding:10px; background:#fff;
      display:flex; flex-direction:column; gap:4px;
    }
    .c4-actor-type {
      font-size:7px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:#9ca3af;
    }
    .c4-actor-name {
      font-size:11px; font-weight:700; color:#374151;
    }
    .c4-actor-desc { font-size:8.5px; color:#6b7280; }

    /* Arrows between actors and system */
    .c4-relations {
      display:flex; flex-direction:column; gap:4px;
      padding: 4px 0;
    }
    .c4-rel {
      display:flex; align-items:center; gap:8px;
      font-size:8.5px; color:#374151;
    }
    .c4-rel-line {
      flex:1; height:1px; background:#d1d5db; position:relative;
    }
    .c4-rel-line::after {
      content:'▶'; position:absolute; right:-2px; top:-6px;
      font-size:7px; color:#9ca3af;
    }
    .c4-rel-label {
      background:#f3f4f6; border-radius:4px;
      padding:2px 6px; white-space:nowrap;
      font-size:8px; color:#4b5563;
    }
    .c4-rel-from { font-weight:600; white-space:nowrap; }
  </style>
</head>
<body>
  <figure class="vkr-figure vkr-figure-wide">
    <div class="vkr-figure-inner vkr-figure-inner-spacious">
      <div class="c4">

        <!-- Actors row -->
        <div class="c4-actors">
          <div class="c4-actor">
            <span class="c4-actor-type">Пользователь</span>
            <span class="c4-actor-name">Автор контента</span>
            <span class="c4-actor-desc">Исследователь, студент, специалист; использует браузер для работы с документами и ссылками</span>
          </div>
          <div class="c4-actor">
            <span class="c4-actor-type">Внешняя система</span>
            <span class="c4-actor-name">Целевые веб-сайты</span>
            <span class="c4-actor-desc">Источники ссылок; отдают HTML по HTTP GET; не контролируются платформой</span>
          </div>
        </div>

        <!-- Relations -->
        <div class="c4-relations">
          <div class="c4-rel">
            <span class="c4-rel-from">Автор → SPA</span>
            <div class="c4-rel-line"></div>
            <span class="c4-rel-label">Редактирует MDX, вставляет URL</span>
          </div>
          <div class="c4-rel">
            <span class="c4-rel-from">API Route → Целевой сайт</span>
            <div class="c4-rel-line"></div>
            <span class="c4-rel-label">HTTP GET (обход CORS); таймаут 6 с</span>
          </div>
        </div>

        <!-- System boundary -->
        <div class="c4-system">
          <span class="c4-system-label">Граница системы — MDX Cards Platform</span>
          <div class="c4-system-inner">

            <div class="c4-box c4-box-browser">
              <span class="c4-box-type">Контейнер</span>
              <span class="c4-box-name">Браузерный SPA</span>
              <span class="c4-box-tech">Next.js 14 / React / CodeMirror 6 / Tailwind v4</span>
              <span class="c4-box-desc">MDX-редактор, превью, галерея карточек, сайдбар документов, онбординг. Хранит документы в localStorage.</span>
            </div>

            <div class="c4-box c4-box-server">
              <span class="c4-box-type">Контейнер</span>
              <span class="c4-box-name">API Route агрегации</span>
              <span class="c4-box-tech">Next.js API Route / Node.js / node-html-parser</span>
              <span class="c4-box-desc">GET /api/metadata?url=... Выполняет HTTP-запрос к целевому сайту, парсит HTML, нормализует DTO, возвращает JSON.</span>
            </div>

            <div class="c4-box c4-box-cache">
              <span class="c4-box-type">Контейнер</span>
              <span class="c4-box-name">Серверный кэш</span>
              <span class="c4-box-tech">In-memory Map&lt;string, CacheEntry&gt;</span>
              <span class="c4-box-desc">Ключ — нормализованный URL. TTL 24 ч. Инвалидация при чтении. Сбрасывается при перезапуске процесса.</span>
            </div>

            <div class="c4-box c4-box-storage">
              <span class="c4-box-type">Контейнер</span>
              <span class="c4-box-name">Хранилище документов</span>
              <span class="c4-box-tech">Browser localStorage / JSON</span>
              <span class="c4-box-desc">Doc[]: id, title, content (raw MDX), createdAt, updatedAt. Экспорт в .mdx — побайтовое соответствие исходнику.</span>
            </div>

          </div>
        </div>

      </div>
    </div>
    <figcaption class="vkr-figcaption">
      Рисунок 11 – C4-диаграмма контейнеров платформы MDX Cards
      <span class="vkr-figcaption-source">Источник: составлено автором на основе нотации C4 Model (Simon Brown)</span>
    </figcaption>
  </figure>
</body>
</html>

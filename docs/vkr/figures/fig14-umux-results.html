<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Рисунок 14 – Результаты UMUX-Lite оценки MVP</title>
  <link rel="stylesheet" href="vkr-figures.css">
  <style>
    .umux { display:flex; flex-direction:column; gap:16px; }

    /* Bar chart */
    .umux-chart {
      display:flex; flex-direction:column; gap:6px;
    }
    .umux-chart-title {
      font-size:9px; font-weight:700; color:#374151;
      text-transform:uppercase; letter-spacing:0.5px;
    }

    .umux-bar-row {
      display:flex; align-items:center; gap:8px;
    }
    .umux-bar-label {
      width:28px; font-size:9px; font-weight:600; color:#374151; text-align:right; flex-shrink:0;
    }
    .umux-bar-track {
      flex:1; height:18px; background:#f3f4f6; border-radius:3px; overflow:hidden;
      position:relative;
    }
    .umux-bar-fill {
      height:100%; border-radius:3px;
      display:flex; align-items:center; padding-left:6px;
      font-size:8px; font-weight:700; color:white;
      transition: width 0.3s;
    }
    .umux-bar-val {
      position:absolute; right:6px; top:50%; transform:translateY(-50%);
      font-size:8px; font-weight:700; color:#374151;
    }

    /* Items labels */
    .umux-item-a { background:#3b82f6; }
    .umux-item-b { background:#7c3aed; }

    /* Threshold lines */
    .umux-threshold {
      position:relative; margin-top:4px;
    }
    .umux-threshold-line {
      position:absolute; top:0; bottom:0;
      border-left: 1.5px dashed;
      display:flex; flex-direction:column;
      justify-content:flex-start;
    }
    .umux-threshold-label {
      font-size:7px; padding:1px 4px; border-radius:3px;
      white-space:nowrap; margin-top:-1px;
    }

    /* Summary */
    .umux-summary {
      display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px;
    }
    .umux-stat {
      border:1.5px solid #e5e7eb; border-radius:8px;
      padding:10px; text-align:center;
      background:#fff;
    }
    .umux-stat-val {
      font-size:22px; font-weight:800; color:#111827;
    }
    .umux-stat-label { font-size:8px; color:#6b7280; margin-top:2px; }
    .umux-stat-ok { border-color:#16a34a; }
    .umux-stat-ok .umux-stat-val { color:#15803d; }

    /* Individual scores */
    .umux-respondents {
      display:grid; grid-template-columns:repeat(7,1fr); gap:5px;
    }
    .umux-r {
      border:1.5px solid #e5e7eb; border-radius:7px;
      padding:7px 5px; text-align:center;
      background:#fff;
    }
    .umux-r-id { font-size:7.5px; color:#9ca3af; }
    .umux-r-score {
      font-size:14px; font-weight:800; margin: 3px 0;
    }
    .umux-r-items { font-size:7px; color:#6b7280; }

    /* Score colour coding */
    .score-good    { color:#15803d; }
    .score-ok      { color:#d97706; }
    .score-below   { color:#dc2626; }

    .umux-legend {
      display:flex; gap:12px; flex-wrap:wrap;
    }
    .umux-legend-item {
      display:flex; align-items:center; gap:4px;
      font-size:8px; color:#6b7280;
    }
    .umux-legend-dot {
      width:8px; height:8px; border-radius:2px; flex-shrink:0;
    }
  </style>
</head>
<body>
  <figure class="vkr-figure vkr-figure-wide">
    <div class="vkr-figure-inner vkr-figure-inner-spacious">
      <div class="umux">

        <!-- Summary stats -->
        <div class="umux-summary">
          <div class="umux-stat umux-stat-ok">
            <div class="umux-stat-val">77,4</div>
            <div class="umux-stat-label">Средний балл UMUX-Lite<br>(шкала 0–100)</div>
          </div>
          <div class="umux-stat">
            <div class="umux-stat-val">5,71</div>
            <div class="umux-stat-label">Среднее по пункту<br>«Отвечает потребностям»</div>
          </div>
          <div class="umux-stat">
            <div class="umux-stat-val">5,57</div>
            <div class="umux-stat-label">Среднее по пункту<br>«Легко использовать»</div>
          </div>
        </div>

        <!-- Individual respondents -->
        <div>
          <div class="umux-chart-title" style="margin-bottom:6px;">Баллы по респондентам</div>
          <div class="umux-respondents">
            <div class="umux-r">
              <div class="umux-r-id">R1</div>
              <div class="umux-r-score score-good">83,3</div>
              <div class="umux-r-items">6 / 6</div>
            </div>
            <div class="umux-r">
              <div class="umux-r-id">R2</div>
              <div class="umux-r-score score-good">75,0</div>
              <div class="umux-r-items">5 / 6</div>
            </div>
            <div class="umux-r">
              <div class="umux-r-id">R3</div>
              <div class="umux-r-score score-good">75,0</div>
              <div class="umux-r-items">6 / 5</div>
            </div>
            <div class="umux-r">
              <div class="umux-r-id">R4</div>
              <div class="umux-r-score score-ok">66,7</div>
              <div class="umux-r-items">5 / 5</div>
            </div>
            <div class="umux-r">
              <div class="umux-r-id">R5</div>
              <div class="umux-r-score score-good">91,7</div>
              <div class="umux-r-items">7 / 6</div>
            </div>
            <div class="umux-r">
              <div class="umux-r-id">R6</div>
              <div class="umux-r-score score-good">75,0</div>
              <div class="umux-r-items">5 / 6</div>
            </div>
            <div class="umux-r">
              <div class="umux-r-id">R7</div>
              <div class="umux-r-score score-good">75,0</div>
              <div class="umux-r-items">6 / 5</div>
            </div>
          </div>
          <div class="umux-legend" style="margin-top:6px;">
            <div class="umux-legend-item">
              <div class="umux-legend-dot" style="background:#15803d;"></div>
              <span>≥ 74 — хорошо</span>
            </div>
            <div class="umux-legend-item">
              <div class="umux-legend-dot" style="background:#d97706;"></div>
              <span>68–73 — удовлетворительно</span>
            </div>
            <div class="umux-legend-item">
              <div class="umux-legend-dot" style="background:#dc2626;"></div>
              <span>&lt; 68 — ниже порога</span>
            </div>
            <div class="umux-legend-item" style="margin-left:auto;">
              <span style="font-style:italic;">Формат ячеек: UMUX-балл; пункт1 / пункт2 (шкала 1–7)</span>
            </div>
          </div>
        </div>

        <!-- Threshold note -->
        <div class="vkr-note" style="margin-top:0;">
          Пороговые значения: 68 баллов — удовлетворительный UX (эквивалент SUS), 74 балла — хорошо. Средний балл MVP 77,4 превышает оба порога. Минимальный результат (R4 = 66,7) обусловлен недостаточной заметностью функции автодополнения при первом запуске.
        </div>

      </div>
    </div>
    <figcaption class="vkr-figcaption">
      Рисунок 14 – Распределение баллов UMUX-Lite по результатам UX-оценки MVP (n = 7)
      <span class="vkr-figcaption-source">Источник: составлено автором по результатам пользовательского тестирования MVP</span>
    </figcaption>
  </figure>
</body>
</html>

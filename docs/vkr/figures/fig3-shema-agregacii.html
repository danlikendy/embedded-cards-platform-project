<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Рисунок 3 – Поток данных при агрегации метаданных</title>
  <link rel="stylesheet" href="vkr-figures.css">
</head>
<body>
  <figure class="vkr-figure vkr-figure-wide">
    <div class="vkr-figure-inner vkr-figure-inner-spacious">

      <div class="vkr-flow-diagram">
        <div class="vkr-flow-row-main">
          <div class="vkr-flow-box">
            <div class="vkr-flow-box-title">Пользователь</div>
            <div class="vkr-flow-box-content">Вставка URL в редактор</div>
          </div>
          <div class="vkr-flow-arrow-h">→</div>
          <div class="vkr-flow-box">
            <div class="vkr-flow-box-title">MDX-редактор</div>
            <div class="vkr-flow-box-content">Debounce → запрос к API</div>
          </div>
          <div class="vkr-flow-arrow-h">→</div>
          <div class="vkr-flow-box vkr-flow-box-accent">
            <div class="vkr-flow-box-title">Сервер / API агрегации</div>
            <div class="vkr-flow-box-content">HTTP GET → парсинг HTML</div>
          </div>
        </div>

        <div class="vkr-flow-row-secondary">
          <div class="vkr-flow-box-small">Open Graph</div>
          <div class="vkr-flow-box-small">JSON-LD</div>
          <div class="vkr-flow-box-small">Microdata</div>
          <div class="vkr-flow-box-small">HTML meta</div>
        </div>

        <div class="vkr-flow-row-main">
          <div class="vkr-flow-box vkr-flow-box-accent">
            <div class="vkr-flow-box-title">Нормализация + кэш</div>
            <div class="vkr-flow-box-content">Приоритет полей: OG → JSON-LD → meta; TTL-кэш по URL</div>
          </div>
          <div class="vkr-flow-arrow-h">→</div>
          <div class="vkr-flow-box">
            <div class="vkr-flow-box-title">DTO метаданных</div>
            <div class="vkr-flow-box-content">title · description · image · canonical URL</div>
          </div>
          <div class="vkr-flow-arrow-h">→</div>
          <div class="vkr-flow-box">
            <div class="vkr-flow-box-title">JSX-карточка в MDX</div>
            <div class="vkr-flow-box-content">компонент с заполненными пропсами</div>
          </div>
        </div>
      </div>

      <div class="vkr-note">
        <span class="vkr-note-label">Приоритет источников:</span> OG → JSON-LD → Microdata → HTML meta. При сбое сети — graceful degradation: URL и домен сохраняются, файл не повреждается.
      </div>
    </div>
    <figcaption class="vkr-figcaption">
      Рисунок 3 – Поток данных при серверной агрегации метаданных и формировании JSX-карточки внешнего источника
      <span class="vkr-figcaption-source">Источник: составлено автором; протоколы Open Graph, JSON-LD — по спецификациям ogp.me и schema.org; архитектура — авторская схема целевого MVP</span>
    </figcaption>
  </figure>
</body>
</html>

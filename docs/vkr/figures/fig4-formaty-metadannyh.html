<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Рисунок 4 – Форматы метаданных</title>
  <link rel="stylesheet" href="vkr-figures.css">
</head>
<body>
  <figure class="vkr-figure">
    <div class="vkr-figure-inner vkr-figure-inner-spacious">
      <h3 class="vkr-figure-title">Форматы метаданных веб-страниц: приоритет и распространённость</h3>
      
      <div class="vkr-bar-chart">
        <div class="vkr-bar-chart-scale">
          <span></span>
          <span class="vkr-bar-scale-values">
            <span>0%</span>
            <span>25%</span>
            <span>50%</span>
            <span>75%</span>
            <span>100%</span>
          </span>
          <span></span>
        </div>
        <div class="vkr-bar-row">
          <span class="vkr-bar-label">Open Graph</span>
          <div class="vkr-bar-track">
            <div class="vkr-bar-fill" style="width: 92%"></div>
          </div>
          <span class="vkr-bar-value">92%</span>
        </div>
        <div class="vkr-bar-row">
          <span class="vkr-bar-label">HTML meta</span>
          <div class="vkr-bar-track">
            <div class="vkr-bar-fill" style="width: 88%"></div>
          </div>
          <span class="vkr-bar-value">88%</span>
        </div>
        <div class="vkr-bar-row">
          <span class="vkr-bar-label">JSON-LD</span>
          <div class="vkr-bar-track">
            <div class="vkr-bar-fill" style="width: 45%"></div>
          </div>
          <span class="vkr-bar-value">45%</span>
        </div>
        <div class="vkr-bar-row">
          <span class="vkr-bar-label">Twitter Cards</span>
          <div class="vkr-bar-track">
            <div class="vkr-bar-fill" style="width: 38%"></div>
          </div>
          <span class="vkr-bar-value">38%</span>
        </div>
        <div class="vkr-bar-row">
          <span class="vkr-bar-label">Microdata</span>
          <div class="vkr-bar-track">
            <div class="vkr-bar-fill" style="width: 22%"></div>
          </div>
          <span class="vkr-bar-value">22%</span>
        </div>
      </div>

      <div class="vkr-bar-note">
        <strong>Приоритет при агрегации:</strong> OG → JSON-LD → Twitter Cards → microdata → HTML meta.<br>
        Процентные значения ориентировочны для типичных веб-сайтов.
      </div>
    </div>
    <figcaption class="vkr-figcaption">Рисунок 4 – Распределение форматов метаданных по распространённости (ориентировочно)</figcaption>
  </figure>
</body>
</html>

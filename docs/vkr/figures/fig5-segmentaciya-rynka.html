<body>
  <figure class="vkr-figure">
    <div class="vkr-figure-inner vkr-figure-inner-spacious">

      <div class="vkr-quadrant-matrix">
        <div class="vkr-quadrant-corner"></div>
        <div class="vkr-quadrant-x-left">← Локальное хранение</div>

        </div>
        <div class="vkr-quadrant-cell">
          <span class="vkr-quadrant-label">Лёгкие Markdown-редакторы</span>
          <span class="vkr-quadrant-apps">Bear, Craft, Typora, iA Writer</span>
        </div>
      </div>

      <div class="vkr-note" style="margin-top:1rem">
        Четыре квадранта отражают типичное позиционирование продуктов; границы между сегментами размыты за счёт гибридных решений (например, Obsidian Publish, Notion API).
      </div>
    </div>
    <figcaption class="vkr-figcaption">
      Рисунок 5 – Позиционирование персональных платформ на матрице «хранение × аудитория»
      <span class="vkr-figcaption-source">Источник: составлено автором на основе сравнительного анализа рынка PKM (п. 2.1); публичные материалы вендоров, 2024</span>
    </figcaption>

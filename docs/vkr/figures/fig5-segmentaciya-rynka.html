<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Рисунок 5 – Сегментация рынка персональных платформ</title>
  <link rel="stylesheet" href="vkr-figures.css">
</head>
<body>
  <figure class="vkr-figure">
    <div class="vkr-figure-inner vkr-figure-inner-spacious">
      <h3 class="vkr-figure-title">Сегментация рынка персональных платформ по осям «локальность — облачность» и «личное — коллаборация»</h3>
      
      <div class="vkr-quadrant-matrix">
        <div class="vkr-quadrant-corner"></div>
        <div class="vkr-quadrant-x-left">Локальное хранение</div>
        <div class="vkr-quadrant-x-right">Облачное хранение</div>
        <div class="vkr-quadrant-y-top">Коллаборация</div>
        <div class="vkr-quadrant-cell">
          <span class="vkr-quadrant-label">Универсальные блокноты</span>
          <span class="vkr-quadrant-apps">Notion, Coda, ClickUp</span>
        </div>
        <div class="vkr-quadrant-cell">
          <span class="vkr-quadrant-label">Публикация, монетизация</span>
          <span class="vkr-quadrant-apps">Substack, Medium, Heptabase</span>
        </div>
        <div class="vkr-quadrant-y-bottom">Личное использование</div>
        <div class="vkr-quadrant-cell">
          <span class="vkr-quadrant-label">PKM, граф связей</span>
          <span class="vkr-quadrant-apps">Obsidian, Logseq, Roam</span>
        </div>
        <div class="vkr-quadrant-cell">
          <span class="vkr-quadrant-label">Редакторы Markdown</span>
          <span class="vkr-quadrant-apps">Bear, Craft, Typora, iA Writer</span>
        </div>
      </div>

      <div class="vkr-flow-note" style="margin-top: 1rem;">
        Четыре квадранта отражают типичное позиционирование продуктов; границы между сегментами размыты за счёт гибридных решений.
      </div>
    </div>
    <figcaption class="vkr-figcaption">Рисунок 5 – Схема сегментации рынка персональных платформ по ключевым параметрам</figcaption>
  </figure>
</body>
</html>

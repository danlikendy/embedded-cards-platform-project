<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Рисунок 6 – Каналы получения метаданных для карточек ссылок</title>
  <link rel="stylesheet" href="vkr-figures.css">
</head>
<body>
  <figure class="vkr-figure">
    <div class="vkr-figure-inner vkr-figure-inner-spacious">

      <div class="vkr-channels">
        <div class="vkr-channel">
          <div class="vkr-channel-header">Нативная платформа</div>
          <div class="vkr-channel-flow">
            <span>URL</span>
            <span class="vkr-channel-arrow">→</span>
            <span>Сервер платформы</span>
            <span class="vkr-channel-arrow">→</span>
            <span>OG / meta</span>
            <span class="vkr-channel-arrow">→</span>
            <span>Карточка (фиксированный шаблон)</span>
          </div>
          <div class="vkr-channel-note">Notion, Craft — vendor lock-in; кастомизация не предусмотрена</div>
        </div>
        <div class="vkr-channel">
          <div class="vkr-channel-header">Плагин (клиентский / прокси)</div>
          <div class="vkr-channel-flow">
            <span>URL</span>
            <span class="vkr-channel-arrow">→</span>
            <span>Клиент браузера или плагин-прокси</span>
            <span class="vkr-channel-arrow">→</span>
            <span>Метаданные</span>
            <span class="vkr-channel-arrow">→</span>
            <span>Карточка</span>
          </div>
          <div class="vkr-channel-note">Obsidian, Logseq — CORS-риски при клиентском парсинге; зависимость от качества плагина</div>
        </div>
        <div class="vkr-channel">
          <div class="vkr-channel-header">Сторонний API (SaaS-агрегатор)</div>
          <div class="vkr-channel-flow">
            <span>URL</span>
            <span class="vkr-channel-arrow">→</span>
            <span>LinkMetadata, Microlink, Iframely</span>
            <span class="vkr-channel-arrow">→</span>
            <span>JSON</span>
            <span class="vkr-channel-arrow">→</span>
            <span>Карточка</span>
          </div>
          <div class="vkr-channel-note">Зависимость от провайдера, лимиты запросов, TCO при масштабировании</div>
        </div>
        <div class="vkr-channel" style="border-color:var(--accent);background:var(--accent-soft)">
          <div class="vkr-channel-header">Собственный серверный агент (целевой контур)</div>
          <div class="vkr-channel-flow">
            <span>URL</span>
            <span class="vkr-channel-arrow">→</span>
            <span>HTTP GET агент (serverless)</span>
            <span class="vkr-channel-arrow">→</span>
            <span>Парсинг OG / JSON-LD</span>
            <span class="vkr-channel-arrow">→</span>
            <span>DTO + кэш</span>
            <span class="vkr-channel-arrow">→</span>
            <span>JSX-карточка в MDX</span>
          </div>
          <div class="vkr-channel-note">CORS не ограничивает; контроль TTL, политики логирования, выбора провайдера</div>
        </div>
      </div>
    </div>
    <figcaption class="vkr-figcaption">
      Рисунок 6 – Сравнение каналов получения метаданных для карточек внешних ссылок: нативная платформа, плагин, сторонний API и собственный агент
      <span class="vkr-figcaption-source">Источник: составлено автором; классификация каналов по результатам сравнительного анализа существующих решений (п. 2.2, табл. 7)</span>
    </figcaption>
  </figure>
</body>
</html>

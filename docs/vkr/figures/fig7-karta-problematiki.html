<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Рисунок 7 – Карта проблематики и ограничений</title>
  <link rel="stylesheet" href="vkr-figures.css">
</head>
<body>
  <figure class="vkr-figure">
    <div class="vkr-figure-inner vkr-figure-inner-spacious">
      <h3 class="vkr-figure-title">Карта проблематики и ограничений существующих решений</h3>
      
      <div class="vkr-problem-map">
        <div class="vkr-problem-card">
          <div class="vkr-problem-title">Формат контента</div>
          <ul class="vkr-problem-list">
            <li>Нет поддержки MDX</li>
            <li>Проприетарные блоковые модели</li>
            <li>Markdown без JSX-расширений</li>
          </ul>
        </div>
        <div class="vkr-problem-card">
          <div class="vkr-problem-title">Карточки ссылок</div>
          <ul class="vkr-problem-list">
            <li>Фиксированные шаблоны, без кастомизации</li>
            <li>Плагины с переменным качеством</li>
            <li>Нет MDX-компонентов</li>
          </ul>
        </div>
        <div class="vkr-problem-card">
          <div class="vkr-problem-title">Автодополнение</div>
          <ul class="vkr-problem-list">
            <li>Только синтаксис / теги</li>
            <li>Нет автодополнения URL → карточка</li>
            <li>Фрагментарная интеграция</li>
          </ul>
        </div>
        <div class="vkr-problem-card">
          <div class="vkr-problem-title">Архитектура</div>
          <ul class="vkr-problem-list">
            <li>Зависимость от вендора (облако)</li>
            <li>Слабая портативность карточек</li>
            <li>Нет единой интеграции</li>
          </ul>
        </div>
      </div>

      <div class="vkr-flow-note" style="margin-top: 1rem;">
        <span class="vkr-flow-note-label">Вывод:</span> Ни один продукт не объединяет MDX, карточки, автодополнение и портативную веб-архитектуру в едином решении.
      </div>
    </div>
    <figcaption class="vkr-figcaption">Рисунок 7 – Систематизация проблематики и ограничений по четырём областям</figcaption>
  </figure>
</body>
</html>

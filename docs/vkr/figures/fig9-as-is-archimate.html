<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Рисунок 8 – AS-IS</title>
  <link rel="stylesheet" href="vkr-figures.css">
  <style>
    .arch { display:flex; flex-direction:column; gap:6px; }

    .arch-layer {
      display:flex; align-items:stretch;
      border-radius:7px; border:1.5px solid;
    }
    .arch-lbl {
      writing-mode:vertical-lr; transform:rotate(180deg);
      font-size:7px; font-weight:800; letter-spacing:1.5px;
      text-transform:uppercase; padding:10px 4px;
      min-width:20px; display:flex; align-items:center;
      justify-content:center; flex-shrink:0;
    }
    .arch-body { flex:1; padding:10px 12px 10px 8px; }

    .l-biz { background:#fefce8; border-color:#d97706; }
    .l-biz .arch-lbl { color:#b45309; background:#fde68a; }
    .l-app { background:#eff6ff; border-color:#3b82f6; }
    .l-app .arch-lbl { color:#1d4ed8; background:#bfdbfe; }
    .l-tec { background:#f0fdf4; border-color:#16a34a; }
    .l-tec .arch-lbl { color:#15803d; background:#bbf7d0; }

    .arow { display:flex; align-items:center; gap:4px; }
    .arow + .arow { margin-top:8px; }

    /* Element */
    .el { border-radius:4px; padding:6px 8px; flex-shrink:0; box-sizing:border-box; }
    .el-type { font-size:6.5px; font-style:italic; opacity:0.6; display:block; margin-bottom:1px; }
    .el-name { font-size:9.5px; font-weight:700; color:#1e293b; display:block; line-height:1.25; }
    .el-sub  { font-size:7.5px; color:#64748b; display:block; margin-top:2px; line-height:1.3; }
    .el-bad  { font-size:7.5px; color:#dc2626; font-weight:600; display:block; margin-top:2px; }
    .el-miss-label { font-size:7.5px; color:#dc2626; font-weight:700; display:block; margin-top:2px; }

    .e-biz  { background:#fef9c3; border:1.5px solid #d97706; }
    .e-app  { background:#dbeafe; border:1.5px solid #3b82f6; }
    .e-tec  { background:#dcfce7; border:1.5px solid #16a34a; }
    .e-miss { background:#f8fafc; border:1.5px dashed #cbd5e1; }
    .e-miss .el-name { color:#94a3b8; }
    .e-miss .el-type { color:#b0bec5; }

    /* Step badge */
    .sn {
      display:inline-flex; align-items:center; justify-content:center;
      width:15px; height:15px; border-radius:50%;
      font-size:8px; font-weight:800; color:#fff; flex-shrink:0; margin-bottom:2px;
    }
    .sn-ok  { background:#475569; }
    .sn-bad { background:#dc2626; }
    .pw { display:flex; flex-direction:column; align-items:center; gap:1px; }

    /* Arrows */
    .arr  { color:#94a3b8; font-size:16px; flex-shrink:0; line-height:1; user-select:none; }
    .arr-faint { color:#e2e8f0; font-size:16px; flex-shrink:0; }

    /* Flow continuation indicator */
    .flow-cont {
      font-size:7.5px; color:#94a3b8; font-style:italic;
      display:flex; align-items:center; gap:3px; margin-left:6px;
    }

    /* Pain zone */
    .pain {
      border:1.5px dashed #ef4444; background:rgba(239,68,68,0.04);
      border-radius:5px; padding:7px 9px; flex:1;
    }
    .pain-hdr {
      font-size:7.5px; color:#dc2626; font-weight:700;
      display:block; margin-bottom:5px; letter-spacing:.3px;
    }

    /* Missing block */
    .miss-zone {
      border:1.5px dashed #cbd5e1; background:#f8fafc;
      border-radius:5px; padding:7px 9px;
      display:flex; flex-direction:column; gap:5px;
    }
    .miss-hdr {
      font-size:7.5px; color:#94a3b8; font-weight:700;
      display:block; margin-bottom:3px; letter-spacing:.3px;
    }

    /* CORS box */
    .cors {
      background:#fff1f2; border:1.5px solid #fca5a5;
      border-radius:5px; padding:6px 8px;
      font-size:7.5px; color:#dc2626; text-align:center; flex-shrink:0;
    }
    .cors strong { display:block; font-size:9px; margin-bottom:2px; }

    /* Output object */
    .out-row { margin-top:8px; }
    .out-label { font-size:7.5px; color:#94a3b8; font-style:italic; display:block; margin-bottom:3px; }

    /* Metrics */
    .mstrip { display:flex; border-radius:5px; overflow:hidden; border:1px solid #e2e8f0; margin-top:4px; }
    .mc { flex:1; padding:6px 8px; background:#fff; border-right:1px solid #e2e8f0; text-align:center; }
    .mc:last-child { border-right:none; }
    .mc-val { font-size:15px; font-weight:800; display:block; line-height:1.1; }
    .mc-val--bad { color:#dc2626; }
    .mc-lbl { font-size:7px; color:#64748b; display:block; margin-top:1px; }

    /* Legend */
    .leg { display:flex; gap:12px; font-size:7.5px; color:#64748b; padding:5px 10px; background:#f8fafc; border:1px solid #e2e8f0; border-radius:5px; flex-wrap:wrap; align-items:center; margin-top:4px; }
    .li { display:flex; align-items:center; gap:4px; }
    .lbd { width:13px; height:9px; border:1.5px dashed #ef4444; border-radius:2px; background:rgba(239,68,68,.05); }
    .lbm { width:13px; height:9px; border:1.5px dashed #cbd5e1; border-radius:2px; background:#f8fafc; }

    /* App 2-col layout */
    .app-cols { display:flex; gap:8px; align-items:stretch; }
    .app-present { display:flex; flex-direction:column; gap:6px; justify-content:center; }
    .app-missing { flex:1; }
  </style>
</head>
<body>
  <figure class="vkr-figure vkr-figure-wide">
    <div class="vkr-figure-inner vkr-figure-inner-spacious">
      <div class="arch">

        <!-- ═══ BUSINESS LAYER ═══ -->
        <div class="arch-layer l-biz">
          <div class="arch-lbl">Бизнес-слой</div>
          <div class="arch-body">

            <!-- Row 1: Actor + steps 1–2 -->
            <div class="arow">
              <div class="pw">
                <div class="el e-biz" style="min-width:88px">
                  <span class="el-type">«actor»</span>
                  <span class="el-name">Автор заметок</span>
                  <span class="el-sub">инициирует вставку внешнего источника</span>
                </div>
              </div>
              <span class="arr">→</span>
              <div class="pw">
                <span class="sn sn-ok">1</span>
                <div class="el e-biz" style="min-width:100px">
                  <span class="el-type">«process»</span>
                  <span class="el-name">Поиск источника</span>
                  <span class="el-sub">открывает сайт в браузере, изучает страницу</span>
                </div>
              </div>
              <span class="arr">→</span>
              <div class="pw">
                <span class="sn sn-ok">2</span>
                <div class="el e-biz" style="min-width:100px">
                  <span class="el-type">«process»</span>
                  <span class="el-name">Копирование URL</span>
                  <span class="el-sub">вручную из адресной строки браузера</span>
                </div>
              </div>
              <div class="flow-cont">→ продолжение ↓</div>
            </div>

            <!-- Row 2: Pain zone with steps 3–5 -->
            <div class="arow" style="margin-top:8px">
              <div class="pain" style="display:flex;flex-direction:column;gap:0">
                <span class="pain-hdr">⚠ ЗОНА РУЧНОГО ТРУДА — риск ошибок и устаревания данных</span>
                <div class="arow">
                  <div class="pw">
                    <span class="sn sn-bad">3</span>
                    <div class="el e-biz" style="min-width:108px">
                      <span class="el-type">«process»</span>
                      <span class="el-name">Чтение метаданных</span>
                      <span class="el-sub">заголовок и описание читает вручную</span>
                      <span class="el-bad">нет доступа к OG-тегам</span>
                    </div>
                  </div>
                  <span class="arr">→</span>
                  <div class="pw">
                    <span class="sn sn-bad">4</span>
                    <div class="el e-biz" style="min-width:108px">
                      <span class="el-type">«process»</span>
                      <span class="el-name">Ввод текста вручную</span>
                      <span class="el-sub">копирует title и description в редактор</span>
                      <span class="el-bad">риск опечаток и устаревания</span>
                    </div>
                  </div>
                  <span class="arr">→</span>
                  <div class="pw">
                    <span class="sn sn-bad">5</span>
                    <div class="el e-biz" style="min-width:108px">
                      <span class="el-type">«process»</span>
                      <span class="el-name">Форматирование ссылки</span>
                      <span class="el-sub">собирает [title](url) в Markdown</span>
                      <span class="el-bad">нет JSX-карточки; нет изображения</span>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <!-- Row 3: Output -->
            <div class="out-row">
              <span class="out-label">↓ результат: сохранён файл</span>
              <div class="el e-biz" style="border-style:dashed; display:inline-flex; flex-direction:column">
                <span class="el-type">«business object»</span>
                <span class="el-name">Markdown-файл — голый URL, без карточки превью</span>
                <span class="el-sub">содержит: [заголовок](url) · нет изображения · нет описания · нет canonical URL · контекст зависит от памяти автора</span>
              </div>
            </div>

          </div>
        </div>

        <!-- ═══ APPLICATION LAYER ═══ -->
        <div class="arch-layer l-app">
          <div class="arch-lbl">Приложения</div>
          <div class="arch-body">

            <div class="app-cols">

              <!-- Present components -->
              <div class="app-present">
                <div class="el e-app" style="min-width:130px">
                  <span class="el-type">«component»</span>
                  <span class="el-name">Браузер</span>
                  <span class="el-sub">просмотр, навигация</span>
                  <span class="el-bad">fetch cross-origin заблокирован CORS</span>
                </div>
                <div class="el e-app" style="min-width:130px">
                  <span class="el-type">«component»</span>
                  <span class="el-name">Markdown-редактор</span>
                  <span class="el-sub">базовый, без MDX-расширений</span>
                  <span class="el-bad">нет автодополнения URL</span>
                  <span class="el-bad">нет рендера карточки превью</span>
                </div>
              </div>

              <!-- Missing components zone -->
              <div class="app-missing">
                <div class="miss-zone" style="height:100%; box-sizing:border-box">
                  <span class="miss-hdr">✗ ОТСУТСТВУЮЩИЙ КОНТУР АГРЕГАЦИИ</span>
                  <div class="arow">
                    <div class="el e-miss" style="flex:1">
                      <span class="el-type">«component»</span>
                      <span class="el-name">API агрегации метаданных</span>
                      <span class="el-miss-label">✗ не реализован</span>
                      <span class="el-sub" style="color:#94a3b8">server-side fetch отсутствует</span>
                    </div>
                    <div class="el e-miss" style="flex:1">
                      <span class="el-type">«application service»</span>
                      <span class="el-name">Парсинг OG / JSON-LD</span>
                      <span class="el-miss-label">✗ не реализован</span>
                      <span class="el-sub" style="color:#94a3b8">нормализация полей отсутствует</span>
                    </div>
                    <div class="el e-miss" style="flex:1">
                      <span class="el-type">«application service»</span>
                      <span class="el-name">Кэш метаданных</span>
                      <span class="el-miss-label">✗ не реализован</span>
                      <span class="el-sub" style="color:#94a3b8">каждый URL — ручная обработка</span>
                    </div>
                  </div>
                </div>
              </div>

            </div>
          </div>
        </div>

        <!-- ═══ TECHNOLOGY LAYER ═══ -->
        <div class="arch-layer l-tec">
          <div class="arch-lbl">Технологии</div>
          <div class="arch-body">
            <div class="arow">
              <div class="el e-tec" style="flex:1">
                <span class="el-type">«technology node»</span>
                <span class="el-name">Внешний сайт-источник</span>
                <span class="el-sub">HTML с OG-тегами, JSON-LD, meta-тегами · метаданные есть, но CORS закрыт для браузерного fetch</span>
              </div>
              <div class="cors" style="margin:0 10px; min-width:110px">
                <strong>CORS-барьер</strong>
                браузерный fetch<br>заблокирован<br>
                <span style="font-size:6.5px;color:#b91c1c">Access-Control-Allow-Origin<br>отсутствует</span>
              </div>
              <div class="el e-tec" style="flex:1">
                <span class="el-type">«technology service»</span>
                <span class="el-name">Файловая система (локальная)</span>
                <span class="el-sub">хранение .md файлов · нет индекса карточек · нет кэша URL</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Metrics -->
        <div class="mstrip">
          <div class="mc"><span class="mc-val mc-val--bad">5</span><span class="mc-lbl">ручных шагов на источник</span></div>
          <div class="mc"><span class="mc-val mc-val--bad">~3–5 мин</span><span class="mc-lbl">затраты времени (оценка)</span></div>
          <div class="mc"><span class="mc-val mc-val--bad">Высокий</span><span class="mc-lbl">риск ошибок при вводе</span></div>
          <div class="mc"><span class="mc-val mc-val--bad">0%</span><span class="mc-lbl">автоматизация агрегации</span></div>
          <div class="mc"><span class="mc-val mc-val--bad">Нет</span><span class="mc-lbl">JSX-карточка превью в MDX</span></div>
        </div>

        <!-- Legend -->
        <div class="leg">
          <div class="li"><div class="lbd"></div><span>зона ручного труда (pain point)</span></div>
          <div class="li"><div class="lbm"></div><span>отсутствующий компонент</span></div>
          <div class="li"><span class="sn sn-ok" style="width:13px;height:13px;font-size:7px">N</span><span>шаг без риска</span></div>
          <div class="li"><span class="sn sn-bad" style="width:13px;height:13px;font-size:7px">N</span><span>шаг с высоким риском ошибки</span></div>
        </div>

      </div>
    </div>
    <figcaption class="vkr-figcaption">
      Рисунок 8 – Архитектурная модель AS-IS: встраивание внешней ссылки без платформенного контура агрегации метаданных
      <span class="vkr-figcaption-source">Источник: составлено автором; модель AS-IS построена по результатам сравнительного анализа существующих решений (п. 2.2); отражает состояние сценария до реализации MVP платформы</span>
    </figcaption>
  </figure>
</body>
</html>
